# zeno.zsh の設定 (https://github.com/yuki-yano/zeno.zsh)
# スペース snippet 専用。Tab 補完 (cd 含む) は fzf-tab (modules/home/fzf-tab.nix)。
history:
  defaultScope: global
  fzfCommand: fzf
  fzfOptions:
    - "-p 50%,50%"
  redact:
  keymap:
    deleteSoft: ctrl-d
    deleteHard: alt-d
    toggleScope: ctrl-r
snippets:
  # Pipes / redirects
  - name: "null"
    keyword: "null"
    snippet: ">/dev/null 2>&1"
    context:
      lbuffer: '.+\s'
  - keyword: G
    snippet: "| grep"
    context:
      lbuffer: '.+\s'
  - name: copy
    keyword: CC
    snippet: "| pbcopy"
    context:
      lbuffer: '.+\s'
  # cd
  - name: cd there
    keyword: CD
    snippet: "&& cd $_"
    context:
      lbuffer: '.+\s'
  - keyword: "-"
    snippet: cd -
  # ls
  - keyword: ll
    snippet: ls -l
  - keyword: la
    snippet: ls -a
  - keyword: lla
    snippet: ls -la
  # Date
  - name: today
    keyword: td
    snippet: date +%Y-%m-%d
    evaluate: true
  # Shell maintenance
  - keyword: r
    snippet: exec $SHELL -l
  - keyword: myip
    snippet: curl ifconfig.me
  # Terraform helpers (require `tf ` prefix)
  - keyword: tf
    snippet: terraform
  - keyword: ap
    snippet: apply
    context:
      lbuffer: '^terraform\s+'
  - keyword: pl
    snippet: plan
    context:
      lbuffer: '^terraform\s+'
  - keyword: in
    snippet: init
    context:
      lbuffer: '^terraform\s+'
  - keyword: st
    snippet: state
    context:
      lbuffer: '^terraform\s+'
  - keyword: stl
    snippet: state list
    context:
      lbuffer: '^terraform\s+'
  # Common tools
  - keyword: py
    snippet: python3
  - keyword: f
    snippet: open .
  - keyword: ld
    snippet: lazydocker
  # AI tools
  - keyword: c
    snippet: claude
  - keyword: cc
    snippet: claude -c
  # Benchmarking
  - keyword: speed
    snippet: hyperfine --warmup 5 --runs 10 'zsh -i -c exit'
