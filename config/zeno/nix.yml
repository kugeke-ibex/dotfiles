# nix-darwin / nix flake (このリポジトリ用)
# zsh alias と被るものは省略 (nix-switch / nfu / ngc は modules/home/shell.nix で alias 済み)。
snippets:
  - name: nix flake show (dotfiles)
    keyword: nfs
    snippet: nix flake show ~/Development/dotfiles
  - name: nix run dotfiles app
    keyword: nra
    snippet: nix run ~/Development/dotfiles#
completions:
  # nix run apps (このリポジトリの flake.apps を補完)
  - name: nix run apps
    patterns:
      - "^nix run ~/Development/dotfiles#$"
    sourceCommand: 'nix flake show ~/Development/dotfiles --json 2>/dev/null | jq -r ''.apps["aarch64-darwin"] // {} | keys[]'''
    options:
      --prompt: "'nix run> '"
