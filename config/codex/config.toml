# Codex が初回起動やプラグイン更新で書き換えるシード設定です。
# marketplace の source / last_updated は実行環境で変わります。
# テンプレだけ更新したい場合は ~/.codex/config.toml をバックアップしてから差分マージしてください。
#
# @homeDirectory@ は home-manager (modules/home/codex.nix) の substituteAll で置換される。
sandbox_mode = "workspace-write"

[marketplaces.openai-bundled]
last_updated = "2026-05-07T04:13:50Z"
source_type = "local"
source = "@homeDirectory@/.codex/.tmp/bundled-marketplaces/openai-bundled"

[marketplaces.openai-primary-runtime]
last_updated = "2026-05-02T06:18:18Z"
source = "@homeDirectory@/.cache/codex-runtimes/codex-primary-runtime/plugins/openai-primary-runtime"
source_type = "local"

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."browser-use@openai-bundled"]
enabled = true
